trigger:
  branches:
    include:
      - main

pool:
  name: Default        # tên agent pool self-hosted của bạn
  # Nếu đặt tên pool khác, đổi lại ở đây

steps:
  - checkout: self
    displayName: Checkout code

  - script: |
      mkdir -p $(Build.ArtifactStagingDirectory)/docker-runtime
      mkdir -p $(Build.ArtifactStagingDirectory)/docker-runtime/compose-files
      cp docker-compose.yml $(Build.ArtifactStagingDirectory)/docker-runtime/compose-files/docker-compose.yml
      if [ -f .env ]; then cp .env $(Build.ArtifactStagingDirectory)/docker-runtime/compose-files/.env; fi
    displayName: Prepare artifact folders

  - script: |
      if [ ! -f .env ]; then
        echo "ERROR: .env file not found. Copy .env.example and fill in values."
        exit 1
      fi
    displayName: Check .env exists

  - script: docker compose pull
    displayName: Pull latest images

  - script: docker compose up -d --build --remove-orphans
    displayName: Build & start services

  - script: docker image prune -f
    displayName: Clean up unused images

  - script: |
      echo "Waiting for services..."
      sleep 5
      docker compose ps
    displayName: Health check

  - script: |
      set +e
      OUT_DIR="$(Build.ArtifactStagingDirectory)/docker-runtime"
      mkdir -p "$OUT_DIR"
      mkdir -p "$OUT_DIR/logs"

      docker compose ps -a > "$OUT_DIR/compose-ps.txt" 2>&1
      docker compose images > "$OUT_DIR/compose-images.txt" 2>&1
      docker compose logs --no-color > "$OUT_DIR/compose-logs.txt" 2>&1
      docker ps -a > "$OUT_DIR/docker-ps.txt" 2>&1
      docker images > "$OUT_DIR/docker-images.txt" 2>&1
      docker system df > "$OUT_DIR/docker-system-df.txt" 2>&1

      CONTAINERS=$(docker compose ps -q)
      if [ -n "$CONTAINERS" ]; then
        for c in $CONTAINERS; do
          docker inspect "$c" > "$OUT_DIR/inspect-$c.json" 2>&1
          docker logs "$c" > "$OUT_DIR/logs/$c.log" 2>&1
        done
      fi

      if [ -d logs ]; then
        cp -r logs "$OUT_DIR/app-logs"
      fi
    displayName: Collect docker runtime artifacts
    condition: always()

  - task: PublishBuildArtifacts@1
    displayName: Publish docker runtime artifacts
    condition: always()
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)/docker-runtime'
      ArtifactName: 'docker-runtime'
      publishLocation: 'Container'
